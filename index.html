<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tiếng Nhật 🇯🇵</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh; color: #fff;
    display: flex; flex-direction: column; align-items: center; padding: 20px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 2rem; font-weight: 800; }
  .header h1 span { color: #f87171; }
  .header p { color: #a5b4fc; font-size: 0.88rem; margin-top: 4px; }

  .mode-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .tab { padding: 7px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #a5b4fc; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
  .tab.active { background: #818cf8; color: #fff; border-color: #818cf8; }

  .chat-container {
    width: 100%; max-width: 680px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; height: 400px; overflow-y: auto; padding: 16px;
    margin-bottom: 14px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 82%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.88rem; line-height: 1.6; white-space: pre-wrap; }
  .msg.user .bubble { background: linear-gradient(135deg,#6366f1,#8b5cf6); border-bottom-right-radius: 4px; }
  .msg.ai   .bubble { background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.12); border-bottom-left-radius: 4px; }
  .meta { font-size: 0.7rem; color: #64748b; margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .speak-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; color: #a5b4fc; padding: 2px 6px; border-radius: 6px; }
  .speak-btn:hover { background: rgba(255,255,255,0.1); }

  .typing { display: flex; gap: 5px; padding: 12px 16px; align-self: flex-start; }
  .typing span { width: 8px; height: 8px; background: #818cf8; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-8px);} }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: #334155; }
  .empty-state .icon { font-size: 3rem; }
  .empty-state p { font-size: 0.85rem; text-align: center; line-height: 1.6; }

  .input-area { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 10px; }
  .text-row { display: flex; gap: 8px; align-items: flex-end; }
  textarea {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px; padding: 12px 16px; color: #fff; font-size: 0.9rem;
    resize: none; outline: none; line-height: 1.5; height: 50px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: #818cf8; }
  textarea::placeholder { color: #475569; }

  .btn { padding: 12px 16px; border-radius: 14px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-mic { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #f87171; font-size: 1.2rem; padding: 12px 15px; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
  .btn-mic.recording { background: #ef4444; color: #fff; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

  .controls-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-sm { padding: 7px 13px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #a5b4fc; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .btn-sm:hover { background: rgba(255,255,255,0.12); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 5px 12px; background: rgba(129,140,248,0.15); border: 1px solid rgba(129,140,248,0.3); border-radius: 20px; font-size: 0.78rem; color: #a5b4fc; cursor: pointer; transition: all 0.2s; }
  .chip:hover { background: rgba(129,140,248,0.3); }

  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: #64748b; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot.busy { background: #f59e0b; animation: pulse 1s infinite; }
  .dot.error { background: #ef4444; }
</style>
</head>
<body>

<div class="header">
  <h1>🇯🇵 Học Tiếng <span>Nhật</span></h1>
  <p>Trò chuyện bằng giọng nói • AI giải thích bằng Tiếng Việt & Nhật</p>
</div>

<div class="mode-tabs">
  <button class="tab active" onclick="setMode('conversation')" id="tab-conversation">💬 Hội thoại</button>
  <button class="tab" onclick="setMode('grammar')" id="tab-grammar">📚 Ngữ pháp</button>
  <button class="tab" onclick="setMode('vocab')" id="tab-vocab">📝 Từ vựng</button>
  <button class="tab" onclick="setMode('translate')" id="tab-translate">🔄 Dịch thuật</button>
</div>

<div class="chat-container" id="chat">
  <div class="empty-state" id="emptyState">
    <div class="icon">🎌</div>
    <p>Bấm 🎤 để nói, hoặc gõ câu hỏi bên dưới<br>AI sẽ trả lời bằng Tiếng Việt kèm Tiếng Nhật!</p>
  </div>
</div>

<div class="input-area">
  <div class="text-row">
    <textarea id="textInput" placeholder="Gõ câu hỏi... (Enter để gửi, Shift+Enter xuống dòng)"></textarea>
    <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">Gửi ➤</button>
  </div>
  <div class="controls-row">
    <button class="btn-sm" onclick="clearChat()">🗑 Xóa chat</button>
    <button class="btn-sm" onclick="toggleAutoSpeak()" id="autoSpeakBtn">🔊 Tự đọc: BẬT</button>
    <button class="btn-sm" onclick="stopSpeaking()">⏹ Dừng đọc</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Đang kết nối...</span>
  </div>
</div>

<script>
  // ── Config: tự động dùng same origin hoặc BACKEND_URL nếu set ──────────────
  const API_URL = window.BACKEND_URL || "https://mistral-backend-vzcs.onrender.com";

  let mode = "conversation", history = [], autoSpeak = true;
  let isRecording = false, recognition = null;

  const SUGGESTIONS = {
    conversation: ["Xin chào là gì?", "Cảm ơn tiếng Nhật?", "Tôi muốn ăn cơm", "Nhà vệ sinh ở đâu?"],
    grammar:      ["Cách dùng は vs が", "Te-form là gì?", "Giải thích に và で", "Cách dùng もう và まだ"],
    vocab:        ["Từ vựng về thức ăn", "Số đếm 1-10", "Màu sắc tiếng Nhật", "Các ngày trong tuần"],
    translate:    ["こんにちは", "ありがとうございます", "どこですか？", "いくらですか？"]
  };

  function setMode(m) {
    mode = m;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + m).classList.add("active");
    renderChips();
  }

  function renderChips() {
    document.getElementById("chips").innerHTML = SUGGESTIONS[mode]
      .map(s => `<span class="chip" onclick="useSuggestion('${s}')">${s}</span>`).join("");
  }

  function useSuggestion(t) {
    document.getElementById("textInput").value = t;
    sendMessage();
  }

  function addMessage(role, text) {
    document.getElementById("emptyState")?.remove();
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    const meta = document.createElement("div");
    meta.className = "meta";
    const time = new Date().toLocaleTimeString("vi-VN", {hour:"2-digit", minute:"2-digit"});
    meta.textContent = role === "user" ? `Bạn • ${time}` : `AI • ${time}`;
    if (role === "ai") {
      const btn = document.createElement("button");
      btn.className = "speak-btn"; btn.textContent = "🔊";
      btn.onclick = () => speak(text);
      meta.appendChild(btn);
    }
    div.appendChild(bubble); div.appendChild(meta);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    document.getElementById("emptyState")?.remove();
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.id = "typing"; div.className = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() { document.getElementById("typing")?.remove(); }

  function clearChat() {
    history = [];
    document.getElementById("chat").innerHTML =
      `<div class="empty-state" id="emptyState"><div class="icon">🎌</div><p>Bấm 🎤 để nói, hoặc gõ câu hỏi bên dưới<br>AI sẽ trả lời bằng Tiếng Việt kèm Tiếng Nhật!</p></div>`;
  }

  async function sendMessage() {
    const input = document.getElementById("textInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    addMessage("user", text);
    history.push({ role: "user", content: text });
    document.getElementById("sendBtn").disabled = true;
    addTyping();
    setStatus("AI đang suy nghĩ...", "busy");
    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode, history })
      });
      const data = await res.json();
      removeTyping();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      history.push({ role: "assistant", content: data.reply });
      addMessage("ai", data.reply);
      if (autoSpeak) speak(data.reply);
      setStatus("Sẵn sàng", "ok");
    } catch (e) {
      removeTyping();
      addMessage("ai", `❌ Lỗi: ${e.message}`);
      setStatus("Lỗi kết nối", "error");
    } finally {
      document.getElementById("sendBtn").disabled = false;
    }
  }

  function toggleMic() { isRecording ? stopMic() : startMic(); }

  function startMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("Trình duyệt không hỗ trợ mic", "error"); return; }
    recognition = new SR();
    recognition.lang = "vi-VN";
    recognition.interimResults = true;
    recognition.continuous = false;
    recognition.onstart = () => {
      isRecording = true;
      document.getElementById("micBtn").classList.add("recording");
      document.getElementById("micBtn").textContent = "⏹";
      setStatus("Đang nghe... hãy nói!", "busy");
    };
    recognition.onresult = (e) => {
      let t = "";
      for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
      document.getElementById("textInput").value = t;
    };
    recognition.onend = () => {
      isRecording = false;
      document.getElementById("micBtn").classList.remove("recording");
      document.getElementById("micBtn").textContent = "🎤";
      setStatus("Sẵn sàng", "ok");
      const t = document.getElementById("textInput").value.trim();
      if (t) sendMessage();
    };
    recognition.onerror = (e) => { setStatus(`Lỗi mic: ${e.error}`, "error"); stopMic(); };
    recognition.start();
  }

  function stopMic() {
    recognition?.stop();
    isRecording = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("micBtn").textContent = "🎤";
  }

  function speak(text) {
    stopSpeaking();
    const u = new SpeechSynthesisUtterance(text);
    const vi = speechSynthesis.getVoices().find(v => v.lang.startsWith("vi"));
    if (vi) u.voice = vi;
    u.lang = "vi-VN"; u.rate = 0.92;
    speechSynthesis.speak(u);
  }

  function stopSpeaking() { speechSynthesis.cancel(); }

  function toggleAutoSpeak() {
    autoSpeak = !autoSpeak;
    document.getElementById("autoSpeakBtn").textContent = `🔊 Tự đọc: ${autoSpeak ? "BẬT" : "TẮT"}`;
  }

  function setStatus(msg, type = "ok") {
    document.getElementById("statusText").textContent = msg;
    const d = document.getElementById("statusDot");
    d.className = "dot" + (type === "busy" ? " busy" : type === "error" ? " error" : "");
  }

  // ── Ping backend để check kết nối ─────────────────────────────────────────
  fetch(`${API_URL}/health`)
    .then(r => r.json())
    .then(() => setStatus("Sẵn sàng", "ok"))
    .catch(() => setStatus("Không kết nối được backend!", "error"));

  speechSynthesis.onvoiceschanged = () => {};
  renderChips();

  document.getElementById("textInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
