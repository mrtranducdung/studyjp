<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tiếng Nhật 🇯🇵</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    color: #fff; padding: 24px 16px;
  }

  /* ── Settings ── */
  .settings {
    width: 100%; max-width: 500px;
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 24px;
  }
  .setting-group { display: flex; flex-direction: column; gap: 4px; }
  .setting-group label { font-size: 0.7rem; color: #475569; }
  select {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #a5b4fc; padding: 7px 12px;
    font-size: 0.8rem; outline: none; cursor: pointer;
  }

  /* ── Teacher ── */
  .teacher-area { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:24px; }
  .avatar-ring {
    width:110px; height:110px; border-radius:50%;
    background: linear-gradient(135deg,#6366f1,#a855f7);
    display:flex; align-items:center; justify-content:center;
    font-size:3rem; transition: box-shadow 0.3s;
  }
  .avatar-ring.speaking { animation: ripple 1.2s infinite; }
  @keyframes ripple {
    0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.5), 0 0 0 8px rgba(99,102,241,0.2); }
    100% { box-shadow: 0 0 0 14px rgba(99,102,241,0.1), 0 0 0 26px rgba(99,102,241,0); }
  }
  .teacher-name { font-size:1.1rem; font-weight:700; }
  .teacher-status { font-size:0.8rem; color:#64748b; display:flex; align-items:center; gap:6px; }
  .sdot { width:7px; height:7px; border-radius:50%; background:#22c55e; flex-shrink:0; }
  .sdot.thinking { background:#f59e0b; animation:blink .8s infinite; }
  .sdot.speaking  { background:#6366f1; animation:blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  /* ── Chat ── */
  .chat-area {
    width:100%; max-width:500px;
    display:flex; flex-direction:column; gap:12px;
    margin-bottom:24px; max-height:360px; overflow-y:auto; padding-right:4px;
  }
  .chat-area::-webkit-scrollbar { width:3px; }
  .chat-area::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

  .bubble-wrap { display:flex; flex-direction:column; animation:fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .bubble-wrap.user { align-items:flex-end; }
  .bubble-wrap.ai   { align-items:flex-start; }

  .bubble { max-width:85%; padding:11px 15px; border-radius:18px; font-size:0.88rem; line-height:1.65; white-space:pre-wrap; }
  .bubble-wrap.user .bubble { background:linear-gradient(135deg,#6366f1,#8b5cf6); border-bottom-right-radius:4px; }
  .bubble-wrap.ai   .bubble { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-bottom-left-radius:4px; }

  .ja-card {
    max-width:85%; margin-top:4px;
    background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.25);
    border-radius:14px; padding:10px 14px; display:flex; flex-direction:column; gap:2px;
  }
  .ja-card .jt   { font-size:1.1rem; color:#e2e8f0; }
  .ja-card .jr   { font-size:0.75rem; color:#818cf8; }
  .ja-card .jm   { font-size:0.75rem; color:#64748b; }
  .ja-card .jbtn { margin-top:6px; align-self:flex-start; padding:3px 10px; border-radius:8px; border:1px solid rgba(99,102,241,0.4); background:transparent; color:#818cf8; font-size:0.72rem; cursor:pointer; }
  .ja-card .jbtn:hover { background:rgba(99,102,241,0.2); }

  .typing-bubble { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:18px; border-bottom-left-radius:4px; padding:14px 18px; display:flex; gap:5px; align-items:center; }
  .typing-bubble span { width:7px; height:7px; border-radius:50%; background:#818cf8; animation:bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2){animation-delay:.2s;} .typing-bubble span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

  .empty-hint { color:#2d3748; font-size:0.82rem; text-align:center; padding:30px 0; font-style:italic; }
  .meta { font-size:0.7rem; color:#64748b; margin-top:3px; }

  /* ── Analysis card ── */
  .analysis-card {
    max-width:85%; margin-top:4px; align-self:flex-end;
    background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.07);
    border-radius:12px; padding:10px 14px;
    font-size:0.78rem; line-height:1.6; color:#94a3b8;
    animation:fadeUp .3s ease;
  }
  .analysis-card .a-row { display:flex; gap:6px; align-items:flex-start; margin-bottom:3px; }
  .analysis-card .a-icon { flex-shrink:0; }
  .analysis-card .correct { color:#4ade80; }
  .analysis-card .wrong   { color:#f87171; }
  .analysis-card .tip     { color:#fbbf24; }

  /* ── Word clickable ── */
  .word { cursor:pointer; border-radius:3px; transition:background .15s; }
  .word:hover { background:rgba(129,140,248,0.3); }

  /* ── Float save bar (near selection, like native copy menu) ── */
  .float-save-bar {
    position: fixed; z-index: 1500;
    background: #1e1e35; border: 1px solid rgba(99,102,241,0.5);
    border-radius: 20px; padding: 5px 5px;
    display: flex; gap: 4px; align-items: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    animation: fadeUp .15s ease;
    /* arrow pointing down */
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }
  .float-save-bar::after {
    content: ""; position: absolute; bottom: -7px; left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: rgba(99,102,241,0.5);
    border-bottom: none;
  }
  .float-save-bar.arrow-up::after {
    bottom: auto; top: -7px;
    border-top: none;
    border-bottom: 7px solid rgba(99,102,241,0.5);
  }
  .float-save-bar button {
    border: none; border-radius: 14px; padding: 7px 14px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .float-save-bar .fsb-sentence { background: rgba(99,102,241,0.3); color: #a5b4fc; }
  .float-save-bar .fsb-word     { background: rgba(99,102,241,0.15); color: #818cf8; }
  .float-save-bar .fsb-close    { background: none; color: #475569; font-size: 0.9rem; padding: 7px 10px; }

  /* ── Save popup ── */
  .save-popup {
    position:fixed; z-index:999;
    background:#1e1e35; border:1px solid rgba(99,102,241,0.4);
    border-radius:12px; padding:8px 4px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    display:flex; flex-direction:column; gap:2px; min-width:170px;
  }
  .save-popup button { background:none; border:none; color:#cbd5e1; font-size:0.82rem; padding:7px 14px; text-align:left; cursor:pointer; border-radius:8px; transition:background .15s; }
  .save-popup button:hover { background:rgba(99,102,241,0.2); }
  .save-popup .sep { height:1px; background:rgba(255,255,255,0.07); margin:2px 8px; }

  /* ── Library modal ── */
  .lib-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; display:flex; align-items:center; justify-content:center; }
  .lib-modal { background:#16162a; border:1px solid rgba(255,255,255,0.1); border-radius:20px; width:100%; max-width:480px; max-height:80vh; display:flex; flex-direction:column; overflow:hidden; margin:16px; }
  .lib-header { padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.07); }
  .lib-header h3 { font-size:1rem; font-weight:700; }
  .lib-close { background:none; border:none; color:#64748b; font-size:1.2rem; cursor:pointer; }
  .lib-tabs { display:flex; padding:12px 16px 0; gap:8px; }
  .lib-tab { padding:6px 16px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#64748b; font-size:0.8rem; cursor:pointer; transition:all .2s; }
  .lib-tab.active { background:rgba(99,102,241,0.25); border-color:#6366f1; color:#a5b4fc; }
  .lib-list { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
  .lib-list::-webkit-scrollbar{width:3px;} .lib-list::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
  .lib-item { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:10px 14px; display:flex; align-items:flex-start; gap:10px; }
  .lib-item .li-text { flex:1; font-size:0.85rem; line-height:1.5; color:#e2e8f0; }
  .lib-item .li-meta { font-size:0.7rem; color:#475569; margin-top:3px; }
  .lib-item .li-del { background:none; border:none; color:#475569; cursor:pointer; font-size:0.8rem; padding:2px 6px; border-radius:6px; flex-shrink:0; }
  .lib-item .li-del:hover { color:#f87171; background:rgba(248,113,113,0.1); }
  .lib-empty { color:#334155; font-size:0.82rem; text-align:center; padding:30px 0; font-style:italic; }

  /* ── Shadowing ── */
  .shadow-item { transition: background .2s, border-color .2s; }
  .shadow-item.active { background: rgba(99,102,241,0.2) !important; border-color: #818cf8 !important; }
  .shadow-item.active .li-text { color: #fff; }
  .shadow-player { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .shadow-play-btn { padding:8px 20px; border-radius:20px; border:none; font-size:0.85rem; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; }
  .shadow-counter { font-size:0.75rem; color:#64748b; }
  .shadow-bar { height:3px; background:rgba(99,102,241,0.2); border-radius:2px; margin:0 16px 4px; overflow:hidden; }
  .shadow-bar-fill { height:100%; background:#6366f1; border-radius:2px; transition:width .1s linear; }

  /* ── Toast ── */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1e1e35; border:1px solid rgba(99,102,241,0.4); border-radius:12px; padding:10px 18px; font-size:0.82rem; color:#e2e8f0; z-index:2000; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,0.4); animation:slideUp .25s ease; }
  .toast button { background:none; border:1px solid rgba(99,102,241,0.4); border-radius:8px; color:#a5b4fc; font-size:0.75rem; padding:3px 10px; cursor:pointer; }
  @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

  /* ── Mic ── */
  .mic-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:14px; }
  .mic-btn { width:76px; height:76px; border-radius:50%; border:none; background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; font-size:1.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(239,68,68,.45); transition:all .2s; }
  .mic-btn:hover:not(:disabled){transform:scale(1.07);}
  .mic-btn:disabled{opacity:.35;cursor:not-allowed;}
  .mic-btn.recording{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 20px rgba(34,197,94,.5);animation:mpulse 1s infinite;}
  @keyframes mpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  .mic-hint { font-size:0.75rem; color:#475569; }
  .live-text { font-size:0.8rem; color:#64748b; font-style:italic; min-height:18px; }

  /* ── Controls ── */
  .controls-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
  .btn-sm { padding:7px 13px; border-radius:10px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#a5b4fc; font-size:0.78rem; cursor:pointer; transition:all .2s; }
  .btn-sm:hover{background:rgba(255,255,255,0.12);}

  /* ── Text input ── */
  .text-row { width:100%; max-width:500px; display:flex; gap:8px; }
  .text-row input { flex:1; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:10px 14px; color:#fff; font-size:0.85rem; outline:none; }
  .text-row input:focus{border-color:#6366f1;}
  .text-row input::placeholder{color:#334155;}
  .send-btn { padding:10px 18px; border-radius:12px; border:none; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; font-size:0.85rem; font-weight:600; cursor:pointer; white-space:nowrap; }
  .send-btn:disabled{opacity:.35;cursor:not-allowed;}

  /* ── Context cards ── */
  .ctx-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:14px 8px; text-align:center; font-size:0.82rem; color:#94a3b8; cursor:pointer; transition:all .2s; line-height:1.6; }
  .ctx-card:hover{background:rgba(99,102,241,0.15);border-color:#6366f1;color:#e2e8f0;}
  .ctx-card.selected{background:rgba(99,102,241,0.25);border-color:#818cf8;color:#e2e8f0;}
  .role-chip { padding:5px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:#94a3b8; font-size:0.78rem; cursor:pointer; transition:all .2s; }
  .role-chip:hover{background:rgba(99,102,241,0.15);border-color:#6366f1;color:#e2e8f0;}
  .role-chip.selected{background:rgba(99,102,241,0.3);border-color:#818cf8;color:#e2e8f0;}
</style>
</head>
<body>

<!-- Settings -->
<div class="settings">
  <div class="setting-group">
    <label id="labelLevel">📊 Trình độ</label>
    <select id="levelSelect" onchange="onSettingChange()">
      <option value="beginner"     id="optBeginner">Mới bắt đầu</option>
      <option value="elementary"   id="optElementary">Sơ cấp (N5-N4)</option>
      <option value="intermediate" id="optIntermediate">Trung cấp (N3-N4)</option>
      <option value="advanced"     id="optAdvanced">Nâng cao (N1-N2)</option>
    </select>
  </div>
  <div class="setting-group">
    <label id="labelVoice">🎙 Giọng Sensei</label>
    <select id="voiceSelect" onchange="onSettingChange()">
      <option value="jf_alpha">Yuki 👩</option>
      <option value="jf_gongitsune">Gongitsune 👩</option>
      <option value="jm_kumo">Kumo 👨</option>
    </select>
  </div>
  <div class="setting-group">
    <label id="labelLang">🌐 Ngôn ngữ</label>
    <select id="langSelect" onchange="onLangChange()">
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="en" selected>🇬🇧 English</option>
      <option value="ja">🇯🇵 日本語</option>
    </select>
  </div>
  <div class="setting-group" style="justify-content:flex-end;">
    <label style="opacity:0;">_</label>
    <div style="display:flex;gap:6px;">
      <button class="btn-sm" id="btnLibrary" onclick="openLibrary()">📚 Danh sách học</button>
      <button class="btn-sm" id="btnReview" onclick="startReview()" style="background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.4);">🔁 Review</button>
    </div>
  </div>
</div>

<!-- Teacher -->
<div class="teacher-area">
  <div class="avatar-ring" id="avatarRing">👩‍🏫</div>
  <div class="teacher-name" id="teacherName">Sensei Yuki</div>
  <div class="teacher-status">
    <div class="sdot" id="sdot"></div>
    <span id="statusText">Chọn ngữ cảnh để bắt đầu!</span>

  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <!-- Setup screen injected here -->
  <div id="setupScreen" style="display:flex;flex-direction:column;gap:14px;padding:8px 4px;">
    <div id="setupTitle" style="font-size:0.85rem;color:#a5b4fc;font-weight:600;text-align:center;">🎌 Chọn ngữ cảnh học hôm nay</div>
    <div id="contextGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div id="setupCustomLabel" style="font-size:0.75rem;color:#475569;">✍️ Hoặc tự nhập ngữ cảnh:</div>
      <textarea id="customCtx" placeholder="VD: Bạn là bạn cùng lớp người Nhật..." style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 14px;color:#fff;font-size:0.82rem;resize:none;outline:none;height:70px;line-height:1.5;"></textarea>
      <button id="setupStartBtn" onclick="startCustomContext()" style="align-self:flex-end;padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:0.82rem;font-weight:600;cursor:pointer;">Bắt đầu →</button>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls-row">
  <button class="btn-sm" onclick="toggleAnalysis()" id="analysisBtn">🔍 Phân tích: BẬT</button>
  <button class="btn-sm" onclick="location.reload()" id="btnRestart">🔄 Bắt đầu lại</button>
</div>

<!-- Mic -->
<div class="mic-wrap">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()" disabled>🎤</button>
  <span class="mic-hint" id="micHint">Chọn ngữ cảnh trước</span>

  <div class="live-text" id="liveText"></div>
</div>

<!-- Text input -->
<div class="text-row">
  <input type="text" id="textInput" placeholder="Hoặc gõ câu hỏi ở đây..." onkeydown="if(event.key==='Enter')sendText()" />
  <button class="send-btn" id="sendBtn" onclick="sendText()" disabled>Gửi</button>

</div>

<script>
// const API_URL = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
//   ? "http://127.0.0.1:5000"
//   : "https://mistral-backend-vzcs.onrender.com";  // ← đổi thành URL thật sau khi deploy

const API_URL = "https://mistral-backend-vzcs.onrender.com";

let history = [], isBusy = false, isRecording = false, mediaRecorder = null, audioChunks = [];
let lastTtsText = "", analysisOn = true, libTab = "sentence";
let uiLang = "en";

// ── i18n ──────────────────────────────────────────────────────────────────────
const STRINGS = {
  vi: {
    labelLevel:"📊 Trình độ", labelVoice:"🎙 Giọng Sensei", labelMic:"🗣 Mic", labelLang:"🌐 Ngôn ngữ",
    optBeginner:"Mới bắt đầu", optElementary:"Sơ cấp (N5-N4)", optIntermediate:"Trung cấp (N3-N4)", optAdvanced:"Nâng cao (N1-N2)",
    optMicVi:"Tiếng Việt", optMicEn:"Tiếng Anh", optMicJa:"Tiếng Nhật",
    btnAnalysisOn:"🔍 Phân tích: BẬT", btnAnalysisOff:"🔍 Phân tích: TẮT",
    btnLibrary:"📚 Danh sách học", btnRestart:"🔄 Bắt đầu lại",
    sendBtn:"Gửi", inputPlaceholder:"Hoặc gõ câu hỏi ở đây...",
    micHintInit:"Chọn ngữ cảnh trước", micHintReady:"Nhấn để nói", micHintListening:"Đang nghe...", micHintReply:"Nhấn để trả lời",
    statusInit:"Chọn ngữ cảnh để bắt đầu!", statusReady:"Sẵn sàng!", statusThinking:"Sensei đang suy nghĩ...",
    statusSpeaking:"Sensei đang nói...", statusPreparing:"Sensei đang chuẩn bị...", statusError:"Lỗi kết nối",
    statusNoBackend:"⚠️ Không kết nối được backend",
    replayBtn:"🔊 Nghe lại", analysisLoading:"⏳ Đang phân tích...",
    floatSentence:"💬 Lưu câu", floatWord:"📝 Lưu từ", floatTranslating:"⏳ Đang dịch...",
    libTitle:"📚 Danh sách học", libTabSentence:"💬 Câu", libTabWord:"📝 Từ",
    libEmptySentence:"Chưa có câu nào", libEmptyWord:"Chưa có từ nào",
    toastSavedSentence:"✅ Đã lưu câu!", toastSavedWord:"✅ Đã lưu từ!", toastExists:"⚠️ Đã có trong danh sách!", toastView:"Xem",
    shadowBtn:"🎙 Shadowing", shadowTitle:"🎙 Shadowing", shadowPlay:"▶ Phát", shadowStop:"⏹ Dừng",
    shadowEmpty:"Chưa có câu nào. Thêm từ danh sách câu.", shadowAdded:"✅ Đã thêm vào Shadowing!", shadowExists:"⚠️ Đã có trong Shadowing!",
    shadowWaiting:"Nhắc lại...", shadowAdd:"🎙",
    btnReview:"🔁 Review", reviewTitle:"🔁 Ôn luyện", reviewEmpty:"⚠️ Chưa có câu nào trong danh sách học!",

function t(key) { return STRINGS[uiLang][key] ?? key; }
function langFlag() { return uiLang==="en"?"🇬🇧":uiLang==="ja"?"🇯🇵":"🇻🇳"; }

function applyLang() {
  const s = STRINGS[uiLang];
  const ids = ["labelLevel","labelVoice","labelMic","labelLang",
    "optBeginner","optElementary","optIntermediate","optAdvanced",
    "optMicVi","optMicEn","optMicJa","btnLibrary","btnReview","btnRestart","sendBtn"];
  for (const id of ids) { const el=document.getElementById(id); if(el) el.textContent=s[id]; }
  document.getElementById("analysisBtn").textContent = analysisOn ? s.btnAnalysisOn : s.btnAnalysisOff;
  document.getElementById("textInput").placeholder = s.inputPlaceholder;
  if (document.getElementById("micBtn")?.disabled)
    document.getElementById("micHint").textContent = s.micHintInit;
  // Setup screen elements
  ["setupTitle","setupCustomLabel","setupStartBtn"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=s[id];});
  const cCtx=document.getElementById("customCtx"); if(cCtx) cCtx.placeholder=s.setupCustomPlaceholder;
  // Rebuild context grid
  const grid=document.getElementById("contextGrid");
  if (grid) grid.innerHTML = s.ctx.map(c=>
    `<div class="ctx-card" onclick="selectContext(this,'${c.emoji} ${c.name}','${c.prompt.replace(/'/g,"\\'")}')">
      ${c.emoji}<br>${c.name}</div>`).join("");
  // Update status text if still in setup phase
  if (document.getElementById("setupScreen"))
    setStatus(s.statusInit);
}

function onLangChange() {
  uiLang = document.getElementById("langSelect").value;
  applyLang();
  if (document.querySelector(".lib-overlay")) renderLibrary();
}

function setStatus(text, state="idle") {
  document.getElementById("statusText").textContent = text;
  const d = document.getElementById("sdot");
  d.className = "sdot" + (state==="thinking"?" thinking":state==="speaking"?" speaking":"");
  document.getElementById("avatarRing").className = "avatar-ring"+(state==="speaking"?" speaking":"");
}

  isBusy = v;
  document.getElementById("micBtn").disabled  = v;
  document.getElementById("sendBtn").disabled = v;
}

// ── Context / Role selection ──────────────────────────────────────────────────
function selectContext(el, label, prompt) {
  document.querySelectorAll(".ctx-card").forEach(c => c.classList.remove("selected"));
  el.classList.add("selected");
  setTimeout(() => showRoleScreen(label, prompt), 300);
}
function startCustomContext() {
  const txt = document.getElementById("customCtx").value.trim();
  if (!txt) return;
  showRoleScreen(t("customCtxLabel"), txt);
}
function showRoleScreen(label, prompt) {
  const screen = document.getElementById("setupScreen");
  const emoji  = [...label][0];
  const sugg   = STRINGS[uiLang].roles[emoji] || { you:[], sensei:[] };
  screen.innerHTML = `
    <div style="font-size:0.85rem;color:#a5b4fc;font-weight:600;text-align:center;">${t("roleTitle")}</div>
    <div style="font-size:0.72rem;color:#475569;text-align:center;">📍 ${label}</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:0.78rem;color:#94a3b8;">${t("roleYou")}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;" id="youChips">
        ${sugg.you.map(r=>`<span class="role-chip" data-who="you" data-val="${r}" onclick="pickRole('you','${r}')">${r}</span>`).join("")}
      </div>
      <input id="youCustom" placeholder="${t("roleYouPh")}" oninput="pickRole('you',this.value)" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;color:#fff;font-size:0.8rem;outline:none;"/>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
      <div style="font-size:0.78rem;color:#94a3b8;">${t("roleSensei")}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;" id="senseiChips">
        ${sugg.sensei.map(r=>`<span class="role-chip" data-who="sensei" data-val="${r}" onclick="pickRole('sensei','${r}')">${r}</span>`).join("")}
      </div>
      <input id="senseiCustom" placeholder="${t("roleSenseiPh")}" oninput="pickRole('sensei',this.value)" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;color:#fff;font-size:0.8rem;outline:none;"/>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;gap:8px;">
      <button onclick="location.reload()" style="padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#64748b;font-size:0.78rem;cursor:pointer;">${t("roleBack")}</button>
      <button onclick="confirmRoles('${label}','${prompt.replace(/'/g,"\\'")}')" id="startBtn" disabled style="padding:8px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:0.82rem;font-weight:600;cursor:pointer;opacity:0.4;">${t("roleStart")}</button>
    </div>
  `;
  window._roles = { you:"", sensei:"" };
}
function pickRole(who, val) {
  if (!val.trim()) return;
  window._roles[who] = val.trim();
  document.querySelectorAll(`[data-who="${who}"]`).forEach(c => c.classList.remove("selected"));
  const chip = document.querySelector(`[data-who="${who}"][data-val="${val}"]`);
  if (chip) {
    chip.classList.add("selected");
    document.getElementById(who+"Custom").value = "";
  }
  const btn = document.getElementById("startBtn");
  if (window._roles.you && window._roles.sensei) { btn.disabled=false; btn.style.opacity="1"; }
}
function confirmRoles(label, prompt) {
  const { you, sensei } = window._roles;
  const full = `${prompt}\n\nLearner plays as: ${you}.\nYou (Sensei) play as: ${sensei}.\nBegin the conversation naturally in Japanese, in character.`;
  startSession(`${label} · 🙋${you} vs 🤖${sensei}`, full);
}

// ── Review session ────────────────────────────────────────────────────────────
function startReview() {
  const lib = loadLib();
  if (!lib.sentences.length) { showToast(t("reviewEmpty")); return; }

  const sentenceList = lib.sentences
    .map((s, i) => `${i+1}. "${s.text}"${s.extra ? ` (${s.extra})` : ""}`)
    .join("\n");

  const contextPrompt = `[REVIEW SESSION]
The learner has saved these Japanese sentences to their study list:
${sentenceList}

Your role as Sensei:
- Go through these sentences one by one in order.
- For each sentence, set up a natural situation or ask a question that would naturally prompt the learner to say that exact sentence (or a close variation).
- Example: if the sentence is "いらっしゃいませ、何になさいますか？", put the learner in the role of a shop clerk and ask them to greet a customer.
- If the learner replies correctly or close to the target sentence, praise them briefly and move to the next.
- If they struggle, give a short hint in ${uiLang==="vi"?"Vietnamese":uiLang==="ja"?"Japanese":"English"} and try again.
- After covering all sentences, loop back and test them again in creative new ways.
- Keep responses SHORT and encouraging. Always end with a prompt or question to elicit the next sentence.`;

  history = [];
  const chatArea = document.getElementById("chatArea");
  chatArea.innerHTML = "";
  document.getElementById("setupScreen")?.remove();

  const badge = document.createElement("div");
  badge.style.cssText = "font-size:0.72rem;color:#a78bfa;text-align:center;padding:4px 0 8px;font-weight:600;";
  badge.textContent = `📍 ${t("reviewTitle")} — ${lib.sentences.length} sentences`;
  chatArea.appendChild(badge);

  document.getElementById("micBtn").disabled = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("micHint").textContent = t("micHintReady");

  history.push({ role: "user", content: `${contextPrompt}\n\nStart NOW with sentence #1. Set up the situation and prompt the learner.` });

  setBusy(true);
  addTyping();
  setStatus(t("statusPreparing"), "thinking");

  fetch(`${API_URL}/chat`, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ history, level: document.getElementById("levelSelect").value, ui_lang: uiLang })
  })
  .then(r => r.json())
  .then(data => {
    removeTyping();
    history.push({ role: "assistant", content: JSON.stringify(data) });
    addAIBubble(data);
    playTTS(data.tts_text);
  })
  .catch(e => { removeTyping(); addAIBubble({reply_text:`❌ ${e.message}`, tts_text:""}); setBusy(false); setStatus(t("statusError"), "idle"); });
}

// ── Start session ─────────────────────────────────────────────────────────────
function startSession(label, contextPrompt) {
  history = [];
  document.getElementById("setupScreen").remove();
  const badge = document.createElement("div");
  badge.style.cssText = "font-size:0.72rem;color:#475569;text-align:center;padding:4px 0 8px;";
  badge.textContent = `📍 ${label}`;
  document.getElementById("chatArea").appendChild(badge);

  document.getElementById("micBtn").disabled  = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("micHint").textContent = t("micHintReady");

  const kickoff = `[SCENARIO]\n${contextPrompt}\n\nStart the role-play NOW. Say your opening line as your character naturally would. Be authentic, not textbook. 1-2 sentences only.`;
  history.push({ role:"user", content:kickoff });

  setBusy(true);
  addTyping();
  setStatus(t("statusPreparing"), "thinking");

  fetch(`${API_URL}/chat`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ history, level: document.getElementById("levelSelect").value, ui_lang: uiLang })
  })
  .then(r=>r.json())
  .then(data => {
    removeTyping();
    history.push({ role:"assistant", content:JSON.stringify(data) });
    addAIBubble(data);
    playTTS(data.tts_text);
  })
  .catch(e => { removeTyping(); addAIBubble({reply_text:`❌ ${e.message}`,tts_text:""}); setBusy(false); setStatus(t("statusError"),"idle"); });
}

// ── Chat UI ───────────────────────────────────────────────────────────────────
function addUserBubble(text) {
  const chat = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap user";
  const b = document.createElement("div");
  b.className = "bubble"; b.textContent = text;
  const m = document.createElement("div");
  m.className = "meta";
  const _loc = uiLang==="ja"?"ja-JP":uiLang==="en"?"en-US":"vi-VN";
  m.textContent = t("roleYouShort") + " • " + new Date().toLocaleTimeString(_loc,{hour:"2-digit",minute:"2-digit"});
  wrap.appendChild(b); wrap.appendChild(m);
  chat.appendChild(wrap);
  chat.scrollTop = 99999;
  return wrap;
}

function addAIBubble(data) {
  const chat = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap ai";

  const card = document.createElement("div");
  card.className = "ja-card";
  card.innerHTML = `
    <div class="jt">${data.tts_text || data.reply_text || ""}</div>
    ${data.romaji?`<div class="jr">📖 ${data.romaji}</div>`:""}
    ${data.translation?`<div class="jm">${langFlag()} ${data.translation}</div>`:""}
    <button class="jbtn" onclick="replayTTS()">${t("replayBtn")}</button>
  `;
  wrap.appendChild(card);

  const m = document.createElement("div");
  m.className = "meta";

// ── Interactive bubble ────────────────────────────────────────────────────────
// Store romaji/translation per element so selectionchange can access them
const _interactiveMap = new WeakMap();
function makeInteractive(el, romaji, translation) {
  el.dataset.interactive = "1";
  _interactiveMap.set(el, { romaji, translation });
}

let _selDebounce = null;
document.addEventListener("selectionchange", () => {
  clearTimeout(_selDebounce);
  hideFloatBar();

  const sel  = window.getSelection();
  const text = sel?.toString().trim();
  if (!text || !sel.rangeCount) return;

  const node = sel.getRangeAt(0).commonAncestorContainer;
  const el   = (node.nodeType === 3 ? node.parentElement : node).closest("[data-interactive]");
  if (!el) return;

  const { romaji, translation } = _interactiveMap.get(el) || {};
  const rect = sel.getRangeAt(0).getBoundingClientRect();

  // Show only after selection is stable — same time native menu appears
  _selDebounce = setTimeout(() => {
    const cur = window.getSelection()?.toString().trim();
    if (cur === text) showFloatBar(text, romaji||"", translation||"", rect);
  }, 400);
});

let _floatBarEl = null;
function showFloatBar(text, romaji, translation, rect) {
  hideFloatBar();
  const bar = document.createElement("div");
  bar.className = "float-save-bar";

  const btnS = document.createElement("button");
  btnS.className = "fsb-sentence"; btnS.textContent = t("floatSentence");
  btnS.onclick = () => { saveItem("sentence", text, romaji, translation); hideFloatBar(); window.getSelection()?.removeAllRanges(); };

  const btnW = document.createElement("button");
  btnW.className = "fsb-word"; btnW.textContent = t("floatWord");
  btnW.onclick = async () => {
    btnW.textContent = t("floatTranslating"); btnW.disabled = true;
    try {
      const res  = await fetch(`${API_URL}/translate`, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ word: text, ui_lang: uiLang }) });
      const data = await res.json();
      saveItem("word", text, data.romaji||"", data.translation||"");
    } catch { saveItem("word", text, "", ""); }
    hideFloatBar(); window.getSelection()?.removeAllRanges();
  };

  const btnX = document.createElement("button");
  btnX.className = "fsb-close"; btnX.textContent = "✕";
  btnX.onclick = () => { hideFloatBar(); window.getSelection()?.removeAllRanges(); };

  bar.appendChild(btnS); bar.appendChild(btnW); bar.appendChild(btnX);
  document.body.appendChild(bar);
  _floatBarEl = bar;

  // On mobile: native menu is above selection → put bar BELOW
  // On desktop: no native menu → put bar ABOVE (nicer UX)
  const barW    = bar.offsetWidth  || 220;
  const barH    = bar.offsetHeight || 44;
  const GAP     = 12;
  const isMobile = window.matchMedia("(pointer:coarse)").matches;

  let top, left, above;
  if (rect) {
    left  = Math.max(8, Math.min(rect.left + rect.width / 2 - barW / 2, window.innerWidth - barW - 8));
    above = !isMobile && rect.top > barH + GAP;
    top   = above ? rect.top - barH - GAP : rect.bottom + GAP;
  } else {
    left  = window.innerWidth / 2 - barW / 2;
    top   = window.innerHeight - barH - 90;
    above = false;
  }
  if (!above) bar.classList.add("arrow-up");
  bar.style.left = left + "px";
  bar.style.top  = top  + "px";
}
function hideFloatBar() { _floatBarEl?.remove(); _floatBarEl = null; }

// ── Library ───────────────────────────────────────────────────────────────────
function loadLib() {
  return {
    sentences: JSON.parse(localStorage.getItem("jp_sentences")||"[]"),
    words:     JSON.parse(localStorage.getItem("jp_words")||"[]"),
  };
}
function saveLib(lib) {
  localStorage.setItem("jp_sentences", JSON.stringify(lib.sentences));
  localStorage.setItem("jp_words",     JSON.stringify(lib.words));
}
function saveItem(type, text, extra, translation) {
  const lib  = loadLib();
  const list = type==="sentence" ? lib.sentences : lib.words;
  const exists = list.find(i=>i.text===text);
  if (exists) { showToast(t("toastExists"), exists.id, type); return; }
  const locale = uiLang==="ja"?"ja-JP":uiLang==="en"?"en-US":"vi-VN";
  list.unshift({ id:Date.now().toString(), text, extra:extra||"", translation:translation||"", lang:uiLang, savedAt:new Date().toLocaleString(locale) });
  saveLib(lib);
  showToast(type==="sentence"?t("toastSavedSentence"):t("toastSavedWord"), null, null);
}
function deleteItem(type, id) {
  const lib = loadLib(), key = type==="sentence"?"sentences":"words";
  lib[key]  = lib[key].filter(i=>i.id!==id);
  saveLib(lib); renderLibrary();
}
function openLibrary(tab) {
  libTab = tab || libTab;
  document.querySelector(".lib-overlay")?.remove();
  const ov = document.createElement("div");
  ov.className = "lib-overlay";
  const lib = loadLib();
  const sh = loadShadowing();
  ov.innerHTML = `
    <div class="lib-modal">
      <div class="lib-header">
        <h3>${t("libTitle")}</h3>
        <button class="lib-close" onclick="stopShadowPlay();this.closest('.lib-overlay').remove()">✕</button>
      </div>
      <div class="lib-tabs">
        <button class="lib-tab ${libTab==="sentence"?"active":""}" onclick="switchLibTab('sentence',event)">${t("libTabSentence")} (${lib.sentences.length})</button>
        <button class="lib-tab ${libTab==="word"?"active":""}"     onclick="switchLibTab('word',event)">${t("libTabWord")} (${lib.words.length})</button>
        <button class="lib-tab ${libTab==="shadowing"?"active":""}" onclick="switchLibTab('shadowing',event)">${t("shadowBtn")} (${sh.length})</button>
      </div>
      <div id="shadowPlayer" style="display:none;">
        <div class="shadow-player">
          <button class="shadow-play-btn" id="shadowPlayBtn" onclick="toggleShadowPlay()">${t("shadowPlay")}</button>
          <span class="shadow-counter" id="shadowCounter"></span>
          <span style="font-size:0.75rem;color:#475569;" id="shadowStatus"></span>
        </div>
        <div class="shadow-bar"><div class="shadow-bar-fill" id="shadowBarFill" style="width:0%"></div></div>
      </div>
      <div class="lib-list" id="libList"></div>
    </div>
  `;
  ov.addEventListener("click", e=>{ if(e.target===ov){ stopShadowPlay(); ov.remove(); } });

function switchLibTab(tab, e) {
  if (libTab === "shadowing" && tab !== "shadowing") stopShadowPlay();
  libTab = tab;
  document.querySelectorAll(".lib-tab").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  renderLibrary();
  const lib = loadLib();
  document.querySelectorAll(".lib-tab")[0].textContent = `${t("libTabSentence")} (${lib.sentences.length})`;
  document.querySelectorAll(".lib-tab")[1].textContent = `${t("libTabWord")} (${lib.words.length})`;
  document.querySelectorAll(".lib-tab")[2].textContent = `${t("shadowBtn")} (${loadShadowing().length})`;
}
async function renderLibrary() {
  const list = document.getElementById("libList");
  if (!list) return;
  const player = document.getElementById("shadowPlayer");
  if (player) player.style.display = libTab==="shadowing" ? "" : "none";

  if (libTab === "shadowing") { renderShadowing(); return; }

  const items = libTab==="sentence" ? loadLib().sentences : loadLib().words;
  if (!items.length) { list.innerHTML=`<div class="lib-empty">${libTab==="sentence"?t("libEmptySentence"):t("libEmptyWord")}</div>`; return; }
  list.innerHTML = items.map((i, idx) => {
    const safeText = i.text.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    const needsRetrans = i.text && (!i.lang || i.lang !== uiLang);
    const transHtml = i.translation
      ? `<div class="li-meta li-trans" id="litrans_${i.id}">${needsRetrans?"⏳...":langFlag()+" "+i.translation}</div>`
      : (needsRetrans ? `<div class="li-meta li-trans" id="litrans_${i.id}">⏳...</div>` : "");
    return `
    <div class="lib-item" id="libitem_${i.id}">
      <div style="font-size:0.7rem;color:#334155;font-weight:700;min-width:22px;padding-top:2px;">${idx+1}.</div>
      <div style="flex:1">
        <div class="li-text">${i.text}</div>
        ${i.extra?`<div class="li-meta">📖 ${i.extra}</div>`:""}
        ${transHtml}
        <div class="li-meta">🕐 ${i.savedAt}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0;">
        <button class="li-del" style="color:#818cf8;" onclick="playLibTTS('${safeText}')" title="TTS">🔊</button>
        ${libTab==="sentence"?`<button class="li-del" style="color:#a78bfa;" onclick="addToShadowing('${i.id}')" title="${t('shadowBtn')}">🎙</button>`:""}
        <button class="li-del" onclick="deleteItem('${libTab}','${i.id}')" title="Delete">🗑</button>
      </div>
    </div>`;
  }).join("");

  // Re-translate items that don't match current language
  const needRetrans = items.filter(i => i.text && (!i.lang || i.lang !== uiLang));
  for (const item of needRetrans) {
    const el = document.getElementById(`litrans_${item.id}`);
    if (!el) continue;
    try {
      const res  = await fetch(`${API_URL}/translate`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ word: item.text, ui_lang: uiLang })
      });
      const data = await res.json();
      if (data.translation) {
        el.textContent = `${langFlag()} ${data.translation}`;
        // Persist the retranslated value
        const lib  = loadLib();
        const arr  = libTab==="sentence" ? lib.sentences : lib.words;
        const stored = arr.find(x=>x.id===item.id);
        if (stored) { stored.translation = data.translation; stored.lang = uiLang; saveLib(lib); }
      }
    } catch { el.textContent = ""; }
  }
}

let _shadowPlaying = false, _shadowIdx = 0, _shadowPauseTimer = null, _shadowAudio = null;

function renderShadowing() {
  const list = document.getElementById("libList");

      </div>
    </div>`;
  }).join("");

function toggleShadowPlay() {
  if (_shadowPlaying) stopShadowPlay();
  else startShadowPlay();
}

function stopShadowPlay() {
  _shadowPlaying = false;
  clearTimeout(_shadowPauseTimer);
  _shadowAudio?.pause();
  _shadowAudio = null;
  const btn = document.getElementById("shadowPlayBtn");
  if (btn) btn.textContent = t("shadowPlay");
  const st = document.getElementById("shadowStatus"); if (st) st.textContent = "";
  const fill = document.getElementById("shadowBarFill"); if (fill) fill.style.width = "0%";
  highlightShadowItem(-1);
}

async function startShadowPlay() {
  const items = loadShadowing();
  if (!items.length) return;
  _shadowPlaying = true;
  _shadowIdx = _shadowIdx >= items.length ? 0 : _shadowIdx;
  const btn = document.getElementById("shadowPlayBtn");
  if (btn) btn.textContent = t("shadowStop");
  while (_shadowPlaying) {
    const items2 = loadShadowing();
    if (!items2.length) { stopShadowPlay(); break; }
    if (_shadowIdx >= items2.length) _shadowIdx = 0;
    const item = items2[_shadowIdx];
    highlightShadowItem(_shadowIdx);
    const ctr = document.getElementById("shadowCounter");
    if (ctr) ctr.textContent = `${_shadowIdx+1} / ${items2.length}`;
    const st = document.getElementById("shadowStatus"); if (st) st.textContent = "";
    // Play TTS
    await playShadowTTS(item.text);
    if (!_shadowPlaying) break;
    // Wait phase — animate bar while user repeats
    const PAUSE = 3500;
    const fill = document.getElementById("shadowBarFill");
    if (fill) fill.style.width = "0%";
    const st2 = document.getElementById("shadowStatus"); if (st2) st2.textContent = t("shadowWaiting");
    await new Promise(resolve => {
      let elapsed = 0;
      const tick = 50;
      const step = () => {
        if (!_shadowPlaying) { resolve(); return; }
        elapsed += tick;
        if (fill) fill.style.width = Math.min(100, elapsed/PAUSE*100) + "%";
        if (elapsed >= PAUSE) resolve();
        else _shadowPauseTimer = setTimeout(step, tick);
      };
      _shadowPauseTimer = setTimeout(step, tick);
    });
    if (!_shadowPlaying) break;
    if (fill) fill.style.width = "0%";
    _shadowIdx++;
  }
}

async function playShadowTTS(text) {
  return new Promise(async resolve => {
    try {
      const res = await fetch(`${API_URL}/tts`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ text, voice: document.getElementById("voiceSelect").value })
      });
      if (!res.ok) { resolve(); return; }
      const url = URL.createObjectURL(await res.blob());
      _shadowAudio = new Audio(url);
      _shadowAudio.onended = () => { URL.revokeObjectURL(url); _shadowAudio=null; resolve(); };
      _shadowAudio.onerror  = () => { URL.revokeObjectURL(url); _shadowAudio=null; resolve(); };
      _shadowAudio.play();
    } catch { resolve(); }
  });
}

function highlightShadowItem(idx) {
  document.querySelectorAll(".shadow-item").forEach((el, i) => el.classList.toggle("active", i===idx));
  if (idx >= 0) document.querySelectorAll(".shadow-item")[idx]?.scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ── Speech Recognition (ElevenLabs STT) ──────────────────────────────────────
function toggleMic() { if(isBusy) return; isRecording ? stopMic() : startMic(); }
async function startMic() {
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch { setStatus(t("statusError") + ": mic", "idle"); return; }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    document.getElementById("liveText").textContent = "";
    const blob = new Blob(audioChunks, { type: "audio/webm" });
    setStatus(t("micHintListening"), "idle");
    try {
      const form = new FormData();
      form.append("file", blob, "audio.webm");
      const res = await fetch(`${API_URL}/stt`, { method: "POST", body: form });
      const data = await res.json();
      const txt = data.text?.trim();
      if (txt) { addUserBubble(txt); askAI(txt); }
      else setStatus(t("statusReady"), "idle");
    } catch(e) { setStatus(t("statusError") + ": STT", "idle"); }
  };

  isRecording = true;
  mediaRecorder.start();
  document.getElementById("micBtn").classList.add("recording");
  document.getElementById("micBtn").textContent = "⏹";
  document.getElementById("micHint").textContent = t("micHintListening");
  setStatus(t("micHintListening"), "idle");
}
function stopMic() {
  mediaRecorder?.stop();
  isRecording = false;
  document.getElementById("micBtn").classList.remove("recording");
  document.getElementById("micBtn").textContent = "🎤";
  document.getElementById("micHint").textContent = t("micHintReady");
}

// ── Init ──────────────────────────────────────────────────────────────────────
applyLang();

fetch(`${API_URL}/health`)
  .then(r=>r.json())
  .then(()=>setStatus(t("statusInit"),"idle"))
  .catch(()=>setStatus(t("statusNoBackend"),"idle"));
</script>
</body>
