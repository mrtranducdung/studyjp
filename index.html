<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tiếng Nhật 🇯🇵</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 24px;
  }

  /* ── Teacher avatar area ── */
  .teacher-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .avatar-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.2rem;
    position: relative;
    transition: box-shadow 0.3s;
  }
  .avatar-ring.speaking {
    box-shadow: 0 0 0 6px rgba(99,102,241,0.3), 0 0 0 14px rgba(99,102,241,0.15), 0 0 0 24px rgba(99,102,241,0.07);
    animation: ripple 1.5s infinite;
  }
  @keyframes ripple {
    0%   { box-shadow: 0 0 0 0px rgba(99,102,241,0.4), 0 0 0 8px rgba(99,102,241,0.2), 0 0 0 16px rgba(99,102,241,0.08); }
    100% { box-shadow: 0 0 0 8px rgba(99,102,241,0.2), 0 0 0 18px rgba(99,102,241,0.08), 0 0 0 28px rgba(99,102,241,0); }
  }

  .teacher-name { font-size: 1.2rem; font-weight: 700; color: #e2e8f0; }
  .teacher-status {
    font-size: 0.82rem; color: #64748b;
    display: flex; align-items: center; gap: 6px;
    min-height: 20px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
  .status-dot.thinking { background: #f59e0b; animation: blink 0.8s infinite; }
  .status-dot.speaking-dot { background: #6366f1; animation: blink 0.6s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* ── Transcript bubble ── */
  .transcript-area {
    width: 100%; max-width: 500px;
    min-height: 80px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 0.92rem;
    line-height: 1.65;
    color: #cbd5e1;
    white-space: pre-wrap;
    text-align: center;
    transition: all 0.3s;
  }
  .transcript-area.ai-bubble {
    border-color: rgba(99,102,241,0.3);
    background: rgba(99,102,241,0.07);
    color: #e2e8f0;
  }
  .transcript-area .placeholder { color: #334155; font-style: italic; }

  /* ── Mic button ── */
  .mic-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .mic-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(239,68,68,0.4);
    position: relative;
  }
  .mic-btn:hover { transform: scale(1.06); }
  .mic-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .mic-btn.recording {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    box-shadow: 0 4px 24px rgba(34,197,94,0.5);
    animation: mic-pulse 1s infinite;
  }
  @keyframes mic-pulse {
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.08); }
  }

  .mic-hint { font-size: 0.78rem; color: #475569; }

  /* ── Mode selector ── */
  .mode-row {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 20px;
  }
  .mode-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: #64748b;
    font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active { background: rgba(99,102,241,0.25); border-color: #6366f1; color: #a5b4fc; }

  /* ── History ── */
  .history-toggle {
    font-size: 0.75rem; color: #475569; cursor: pointer;
    text-decoration: underline; text-underline-offset: 3px;
    margin-bottom: 8px;
  }
  .history-box {
    display: none;
    width: 100%; max-width: 500px;
    max-height: 220px;
    overflow-y: auto;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 12px;
    gap: 10px;
    flex-direction: column;
  }
  .history-box.open { display: flex; }
  .history-box::-webkit-scrollbar { width: 3px; }
  .history-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .h-msg { font-size: 0.8rem; line-height: 1.5; }
  .h-msg.user { color: #818cf8; text-align: right; }
  .h-msg.ai   { color: #94a3b8; }
  .h-label { font-size: 0.65rem; color: #334155; margin-bottom: 2px; }
</style>
</head>
<body>

<!-- Teacher -->
<div class="teacher-area">
  <div class="avatar-ring" id="avatarRing">👩‍🏫</div>
  <div class="teacher-name">Sensei Yuki</div>
  <div class="teacher-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Sẵn sàng dạy bạn!</span>
  </div>
</div>

<!-- Mode -->
<div class="mode-row">
  <button class="mode-btn active" onclick="setMode('conversation',this)">💬 Hội thoại</button>
  <button class="mode-btn" onclick="setMode('grammar',this)">📚 Ngữ pháp</button>
  <button class="mode-btn" onclick="setMode('vocab',this)">📝 Từ vựng</button>
  <button class="mode-btn" onclick="setMode('translate',this)">🔄 Dịch thuật</button>
</div>

<!-- Transcript -->
<div class="transcript-area" id="transcript">
  <span class="placeholder">Nhấn mic và nói với Sensei Yuki...</span>
</div>

<!-- Mic -->
<div class="mic-wrap">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <span class="mic-hint" id="micHint">Nhấn để nói</span>
</div>

<!-- History -->
<span class="history-toggle" onclick="toggleHistory()">📜 Xem lịch sử hội thoại</span>
<div class="history-box" id="historyBox"></div>

<script>
const API_URL = "https://mistral-backend-vzcs.onrender.com"; // ← thay URL backend vào đây

const SYSTEM_PROMPTS = {
  conversation: `Bạn là Sensei Yuki, giáo viên tiếng Nhật thân thiện và vui vẻ cho người Việt Nam.
Hãy nói chuyện tự nhiên như đang dạy học trực tiếp.
- Trả lời bằng TIẾNG VIỆT, ngắn gọn (2-4 câu), tự nhiên như thầy cô nói chuyện
- Khi dùng tiếng Nhật: kèm romaji và nghĩa Việt ngay sau
- Khuyến khích, khen ngợi học sinh
- Đặt câu hỏi lại để luyện tập nếu phù hợp`,

  grammar: `Bạn là Sensei Yuki, giáo viên ngữ pháp tiếng Nhật cho người Việt.
- Giải thích ngữ pháp bằng tiếng Việt, ngắn gọn dễ hiểu
- Luôn cho ví dụ thực tế kèm romaji
- Nói như đang giảng bài trực tiếp, thân thiện`,

  vocab: `Bạn là Sensei Yuki, dạy từ vựng tiếng Nhật cho người Việt.
- Giới thiệu từ: Kanji – Romaji – Nghĩa Việt
- Dùng từ đó trong câu đơn giản
- Nói ngắn gọn, vui vẻ như đang trò chuyện`,

  translate: `Bạn là Sensei Yuki, phiên dịch Nhật–Việt.
- Dịch chính xác, giải thích ngắn gọn
- Chỉ ra sắc thái lịch sự nếu có
- Trả lời tự nhiên như giáo viên nói chuyện`
};

let mode = "conversation";
let history = [];
let isRecording = false;
let recognition = null;
let isBusy = false;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showTranscript(text, isAI = false) {
  const el = document.getElementById("transcript");
  el.textContent = text;
  el.className = "transcript-area" + (isAI ? " ai-bubble" : "");
}

function setStatus(text, state = "idle") {
  document.getElementById("statusText").textContent = text;
  const dot = document.getElementById("statusDot");
  dot.className = "status-dot" + (state === "thinking" ? " thinking" : state === "speaking" ? " speaking-dot" : "");
  const ring = document.getElementById("avatarRing");
  ring.className = "avatar-ring" + (state === "speaking" ? " speaking" : "");
}

function setBusy(val) {
  isBusy = val;
  document.getElementById("micBtn").disabled = val;
}

// ── History ───────────────────────────────────────────────────────────────────
function pushHistory(role, text) {
  const box = document.getElementById("historyBox");
  const wrap = document.createElement("div");
  const label = document.createElement("div");
  label.className = "h-label";
  label.textContent = role === "user" ? "Bạn" : "Sensei Yuki";
  const msg = document.createElement("div");
  msg.className = `h-msg ${role}`;
  msg.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(msg);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function toggleHistory() {
  document.getElementById("historyBox").classList.toggle("open");
}

// ── Send to AI ─────────────────────────────────────────────────────────────────
async function askAI(userText) {
  history.push({ role: "user", content: userText });
  pushHistory("user", userText);

  setBusy(true);
  setStatus("Sensei đang suy nghĩ...", "thinking");

  try {
    const res = await fetch(`${API_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode, history })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    const reply = data.reply;
    history.push({ role: "assistant", content: reply });
    pushHistory("ai", reply);

    showTranscript(reply, true);
    speakReply(reply);
  } catch (e) {
    setStatus("Lỗi kết nối 😢", "idle");
    showTranscript(`❌ ${e.message}`);
    setBusy(false);
  }
}

// ── TTS ────────────────────────────────────────────────────────────────────────
function speakReply(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const vi = voices.find(v => v.lang.startsWith("vi"));
  if (vi) u.voice = vi;
  u.lang = "vi-VN";
  u.rate = 0.9;

  setStatus("Sensei đang nói...", "speaking");

  u.onend = () => {
    setStatus("Sẵn sàng dạy bạn!", "idle");
    setBusy(false);
    document.getElementById("micHint").textContent = "Nhấn để trả lời";
  };

  u.onerror = () => {
    setStatus("Sẵn sàng dạy bạn!", "idle");
    setBusy(false);
  };

  speechSynthesis.speak(u);
}

// ── Speech Recognition ─────────────────────────────────────────────────────────
function toggleMic() {
  if (isBusy) return;
  isRecording ? stopMic() : startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus("Trình duyệt không hỗ trợ mic!", "idle"); return; }

  recognition = new SR();
  recognition.lang = "vi-VN";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById("micBtn").classList.add("recording");
    document.getElementById("micBtn").textContent = "⏹";
    document.getElementById("micHint").textContent = "Đang nghe... nhấn để dừng";
    setStatus("Đang nghe bạn...", "idle");
    showTranscript("🎙️ ...");
  };

  recognition.onresult = (e) => {
    let t = "";
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    showTranscript("🗣️ " + t);
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("micBtn").textContent = "🎤";
    document.getElementById("micHint").textContent = "Nhấn để nói";

    const text = document.getElementById("transcript").textContent.replace("🗣️ ", "").trim();
    if (text && text !== "🎙️ ...") {
      askAI(text);
    } else {
      setStatus("Sẵn sàng dạy bạn!", "idle");
      showTranscript("", false);
      document.getElementById("transcript").innerHTML = `<span class="placeholder">Nhấn mic và nói với Sensei Yuki...</span>`;
    }
  };

  recognition.onerror = (e) => {
    setStatus(`Lỗi mic: ${e.error}`, "idle");
    stopMic();
  };

  recognition.start();
}

function stopMic() {
  recognition?.stop();
}

// ── Init ────────────────────────────────────────────────────────────────────────
speechSynthesis.onvoiceschanged = () => {};

fetch(`${API_URL}/health`)
  .then(r => r.json())
  .then(() => setStatus("Sẵn sàng dạy bạn!", "idle"))
  .catch(() => setStatus("⚠️ Không kết nối được backend", "idle"));
</script>
</body>
</html>
