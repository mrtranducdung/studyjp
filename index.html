<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tiếng Nhật 🇯🇵</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    color: #fff; padding: 24px 16px;
  }

  /* ── Settings bar ── */
  .settings {
    width: 100%; max-width: 500px;
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 24px;
  }
  .setting-group { display: flex; flex-direction: column; gap: 4px; }
  .setting-group label { font-size: 0.7rem; color: #475569; }
  select {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #a5b4fc; padding: 7px 12px;
    font-size: 0.8rem; outline: none; cursor: pointer;
  }
  select:focus { border-color: #6366f1; }

  /* ── Teacher ── */
  .teacher-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; margin-bottom: 24px;
  }
  .avatar-ring {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; transition: box-shadow 0.3s;
  }
  .avatar-ring.speaking { animation: ripple 1.2s infinite; }
  @keyframes ripple {
    0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.5), 0 0 0 8px rgba(99,102,241,0.2); }
    100% { box-shadow: 0 0 0 14px rgba(99,102,241,0.1), 0 0 0 26px rgba(99,102,241,0); }
  }
  .teacher-name { font-size: 1.1rem; font-weight: 700; }
  .teacher-status { font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 6px; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .sdot.thinking { background: #f59e0b; animation: blink .8s infinite; }
  .sdot.speaking  { background: #6366f1; animation: blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  /* ── Chat bubbles ── */
  .chat-area {
    width: 100%; max-width: 500px;
    display: flex; flex-direction: column; gap: 12px;
    margin-bottom: 24px;
    max-height: 360px; overflow-y: auto;
    padding-right: 4px;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  .bubble-wrap { display: flex; flex-direction: column; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .bubble-wrap.user { align-items: flex-end; }
  .bubble-wrap.ai   { align-items: flex-start; }

  .bubble {
    max-width: 85%; padding: 11px 15px;
    border-radius: 18px; font-size: 0.88rem; line-height: 1.65;
    white-space: pre-wrap;
  }
  .bubble-wrap.user .bubble {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-bottom-right-radius: 4px;
  }
  .bubble-wrap.ai .bubble {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-bottom-left-radius: 4px;
  }

  /* Japanese card below AI bubble */
  .ja-card {
    max-width: 85%; margin-top: 4px;
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
    border-radius: 14px; padding: 10px 14px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .ja-card .jt   { font-size: 1.1rem; color: #e2e8f0; }
  .ja-card .jr   { font-size: 0.75rem; color: #818cf8; }
  .ja-card .jm   { font-size: 0.75rem; color: #64748b; }
  .ja-card .jbtn {
    margin-top: 6px; align-self: flex-start;
    padding: 3px 10px; border-radius: 8px;
    border: 1px solid rgba(99,102,241,0.4); background: transparent;
    color: #818cf8; font-size: 0.72rem; cursor: pointer; transition: background .2s;
  }
  .ja-card .jbtn:hover { background: rgba(99,102,241,0.2); }

  .typing-bubble {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px; border-bottom-left-radius: 4px;
    padding: 14px 18px; display: flex; gap: 5px; align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px; border-radius: 50%; background: #818cf8;
    animation: bounce 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: .2s; }
  .typing-bubble span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-7px);} }

  .empty-hint { color: #2d3748; font-size: 0.82rem; text-align: center; padding: 30px 0; font-style: italic; }

  /* ── Mic ── */
  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 14px; }
  .mic-btn {
    width: 76px; height: 76px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff; font-size: 1.9rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(239,68,68,.45); transition: all .2s;
  }
  .mic-btn:hover:not(:disabled) { transform: scale(1.07); }
  .mic-btn:disabled { opacity: .35; cursor: not-allowed; }
  .mic-btn.recording {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    box-shadow: 0 4px 20px rgba(34,197,94,.5);
    animation: mpulse 1s infinite;
  }
  @keyframes mpulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  .mic-hint { font-size: 0.75rem; color: #475569; }
  .live-text { font-size: 0.8rem; color: #64748b; font-style: italic; min-height: 18px; }

  /* ── Text input fallback ── */
  .text-row { width: 100%; max-width: 500px; display: flex; gap: 8px; }
  .text-row input {
    flex: 1; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
    padding: 10px 14px; color: #fff; font-size: 0.85rem; outline: none;
  }
  .text-row input:focus { border-color: #6366f1; }
  .text-row input::placeholder { color: #334155; }
  .send-btn {
    padding: 10px 18px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Settings -->
<div class="settings">
  <div class="setting-group">
    <label>📊 Trình độ</label>
    <select id="levelSelect" onchange="onSettingChange()">
      <option value="beginner">Mới bắt đầu</option>
      <option value="elementary">Sơ cấp (N5-N4)</option>
      <option value="intermediate">Trung cấp (N3-N4)</option>
      <option value="advanced">Nâng cao (N1-N2)</option>
    </select>
  </div>
  <div class="setting-group">
    <label>🎙 Giọng Sensei</label>
    <select id="voiceSelect">
      <option value="female">Nữ (Yuki)</option>
      <option value="male">Nam (Kenji)</option>
    </select>
  </div>
  <div class="setting-group">
    <label>🗣 Ngôn ngữ nói của bạn</label>
    <select id="srLangSelect">
      <option value="vi-VN">Tiếng Việt</option>
      <option value="ja-JP">Tiếng Nhật</option>
    </select>
  </div>
</div>

<!-- Teacher -->
<div class="teacher-area">
  <div class="avatar-ring" id="avatarRing">👩‍🏫</div>
  <div class="teacher-name" id="teacherName">Sensei Yuki</div>
  <div class="teacher-status">
    <div class="sdot" id="sdot"></div>
    <span id="statusText">Sẵn sàng!</span>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="empty-hint" id="emptyHint">Nhấn mic hoặc gõ để bắt đầu học với Sensei...</div>
</div>

<!-- Mic -->
<div class="mic-wrap">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <span class="mic-hint" id="micHint">Nhấn để nói</span>
  <div class="live-text" id="liveText"></div>
</div>

<!-- Text input fallback -->
<div class="text-row">
  <input type="text" id="textInput" placeholder="Hoặc gõ câu hỏi ở đây..." onkeydown="if(event.key==='Enter')sendText()" />
  <button class="send-btn" id="sendBtn" onclick="sendText()">Gửi</button>
</div>

<script>
const API_URL = "https://mistral-backend-vzcs.onrender.com"; // ← thay URL backend

let history = [];
let isBusy  = false;
let isRecording = false;
let recognition = null;
let lastTtsText = "";

// ── Settings ──────────────────────────────────────────────────────────────────
function onSettingChange() {
  const voice = document.getElementById("voiceSelect").value;
  document.getElementById("teacherName").textContent = voice === "female" ? "Sensei Yuki" : "Sensei Kenji";
  document.getElementById("avatarRing").textContent  = voice === "female" ? "👩‍🏫" : "👨‍🏫";
}

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(text, state = "idle") {
  document.getElementById("statusText").textContent = text;
  const dot  = document.getElementById("sdot");
  dot.className = "sdot" + (state === "thinking" ? " thinking" : state === "speaking" ? " speaking" : "");
  document.getElementById("avatarRing").className =
    "avatar-ring" + (state === "speaking" ? " speaking" : "");
}

function setBusy(v) {
  isBusy = v;
  document.getElementById("micBtn").disabled  = v;
  document.getElementById("sendBtn").disabled = v;
}

// ── Chat UI ───────────────────────────────────────────────────────────────────
function addUserBubble(text) {
  document.getElementById("emptyHint")?.remove();
  const chat = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap user";
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  wrap.appendChild(b);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  document.getElementById("emptyHint")?.remove();
  const chat = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap ai";
  wrap.id = "typingWrap";
  const t = document.createElement("div");
  t.className = "typing-bubble";
  t.innerHTML = "<span></span><span></span><span></span>";
  wrap.appendChild(t);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { document.getElementById("typingWrap")?.remove(); }

function addAIBubble(data) {
  const chat = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap ai";

  // Main reply bubble
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = data.reply_text || "";
  wrap.appendChild(b);

  // Japanese card (if tts_text exists)
  if (data.tts_text) {
    const card = document.createElement("div");
    card.className = "ja-card";
    card.innerHTML = `
      <div class="jt">${data.tts_text}</div>
      ${data.romaji    ? `<div class="jr">📖 ${data.romaji}</div>` : ""}
      ${data.translation ? `<div class="jm">🇻🇳 ${data.translation}</div>` : ""}
      <button class="jbtn" onclick="replayTTS()">🔊 Nghe lại</button>
    `;
    wrap.appendChild(card);
  }

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

// ── TTS (Web Speech API - ja-JP, free) ───────────────────────────────────────
function playTTS(text) {
  return new Promise((resolve) => {
    if (!text) { setBusy(false); setStatus("Sẵn sàng!", "idle"); resolve(); return; }
    lastTtsText = text;

    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 0.9;
    u.pitch = document.getElementById("voiceSelect").value === "female" ? 1.2 : 0.8;

    // Pick best available Japanese voice
    const voices = speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang === "ja-JP" && v.localService)
                 || voices.find(v => v.lang === "ja-JP")
                 || voices.find(v => v.lang.startsWith("ja"));
    if (jaVoice) u.voice = jaVoice;

    setStatus("Sensei đang nói...", "speaking");

    u.onend = () => {
      setStatus("Sẵn sàng!", "idle");
      setBusy(false);
      document.getElementById("micHint").textContent = "Nhấn để trả lời";
      resolve();
    };
    u.onerror = () => { setStatus("Sẵn sàng!", "idle"); setBusy(false); resolve(); };

    speechSynthesis.speak(u);
  });
}

function replayTTS() { if (lastTtsText) playTTS(lastTtsText); }

// ── Ask AI ────────────────────────────────────────────────────────────────────
async function askAI(userText) {
  history.push({ role: "user", content: userText });
  setBusy(true);
  addTyping();
  setStatus("Sensei đang suy nghĩ...", "thinking");

  const level = document.getElementById("levelSelect").value;

  try {
    const res = await fetch(`${API_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ history, level })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    removeTyping();
    history.push({ role: "assistant", content: JSON.stringify(data) });
    addAIBubble(data);
    await playTTS(data.tts_text);

  } catch (e) {
    removeTyping();
    addAIBubble({ reply_text: `❌ ${e.message}`, tts_text: "" });
    setStatus("Lỗi kết nối", "idle");
    setBusy(false);
  }
}

function sendText() {
  const input = document.getElementById("textInput");
  const text  = input.value.trim();
  if (!text || isBusy) return;
  input.value = "";
  addUserBubble(text);
  askAI(text);
}

// ── Speech Recognition ────────────────────────────────────────────────────────
function toggleMic() {
  if (isBusy) return;
  isRecording ? stopMic() : startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus("Trình duyệt không hỗ trợ mic!", "idle"); return; }

  const lang = document.getElementById("srLangSelect").value;
  recognition = new SR();
  recognition.lang = lang;
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById("micBtn").classList.add("recording");
    document.getElementById("micBtn").textContent = "⏹";
    document.getElementById("micHint").textContent = "Đang nghe... nhấn để dừng";
    setStatus("Đang nghe...", "idle");
  };

  recognition.onresult = (e) => {
    let t = "";
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById("liveText").textContent = t;
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("micBtn").textContent = "🎤";
    document.getElementById("micHint").textContent = "Nhấn để nói";
    const t = document.getElementById("liveText").textContent.trim();
    document.getElementById("liveText").textContent = "";
    if (t) { addUserBubble(t); askAI(t); }
    else setStatus("Sẵn sàng!", "idle");
  };

  recognition.onerror = (e) => {
    setStatus(`Lỗi mic: ${e.error}`, "idle");
    stopMic();
  };

  recognition.start();
}

function stopMic() {
  recognition?.stop();
  isRecording = false;
  document.getElementById("micBtn").classList.remove("recording");
  document.getElementById("micBtn").textContent = "🎤";
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetch(`${API_URL}/health`)
  .then(r => r.json())
  .then(() => setStatus("Sẵn sàng!", "idle"))
  .catch(() => setStatus("⚠️ Không kết nối được backend", "idle"));
</script>
</body>
</html>
